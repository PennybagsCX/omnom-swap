                  - button "What is a DEX aggregator?" [ref=e54] [cursor=pointer]:
                    - generic [ref=e55]:
                      - img [ref=e57]
                      - generic [ref=e61]: What is a DEX aggregator?
                    - img [ref=e62]
                  - generic [ref=e65]:
                    - paragraph [ref=e66]: A DEX aggregator is an interface that computes swap routes across multiple decentralized exchanges (DEXes) to find routes with different output amounts. Unlike a single DEX, an aggregator routes trades across multiple venues to find the best available price.
                    - paragraph [ref=e67]:
                      - strong [ref=e68]: "How OmnomSwap works:"
                    - list [ref=e69]:
                      - listitem [ref=e70]: Reads pool reserves from all DEXes on Dogechain
                      - listitem [ref=e71]: Builds a liquidity graph connecting all tokens
                      - listitem [ref=e72]: Uses BFS to enumerate all possible routes up to 4 hops
                      - listitem [ref=e73]: Calculates expected output for each route using the AMM formula
                      - listitem [ref=e74]: Displays all viable routes sorted by output amount
                      - listitem [ref=e75]: User selects a route and signs the transaction
                    - paragraph [ref=e76]:
                      - text: Route computation happens
                      - strong [ref=e77]: off-chain
                      - text: in your browser. Execution happens
                      - strong [ref=e78]: on-chain
                      - text: via a smart contract that atomically executes all hops in a single transaction.
                    - paragraph [ref=e79]:
                      - strong [ref=e80]: "⚠️ Known limitation:"
                      - text: The aggregator only supports
                      - strong [ref=e81]: exact-input
                      - text: swaps (you specify the amount to sell). Exact-output swaps (specifying the amount to buy) are not supported. Additionally, the contract uses
                      - code [ref=e82]: swapExactTokensForTokens
                      - text: for all swaps — native DOGE must be wrapped to WWDOGE first.
                - generic [ref=e83]:
                  - button "What is slippage and how to set it?" [ref=e84] [cursor=pointer]:
                    - generic [ref=e85]:
                      - img [ref=e87]
                      - generic [ref=e90]: What is slippage and how to set it?
                    - img [ref=e91]
                  - generic [ref=e94]:
                    - paragraph [ref=e95]:
                      - strong [ref=e96]: Slippage
                      - text: is the difference between the expected output of a trade and the actual output when the transaction is executed on-chain. It occurs because pool reserves change between when you submit a transaction and when it is mined.
                    - paragraph [ref=e97]:
                      - strong [ref=e98]: Slippage tolerance
                      - text: is the maximum acceptable difference. If the actual output would be less than (expected output × (1 - slippage%)), the transaction will revert.
                    - paragraph [ref=e99]:
                      - strong [ref=e100]: "How to set it:"
                    - list [ref=e101]:
                      - listitem [ref=e102]:
                        - strong [ref=e103]: "0.1% – 0.5%:"
                        - text: For liquid pairs with large reserves. Lower risk of unfavorable execution.
                      - listitem [ref=e104]:
                        - strong [ref=e105]: "0.5% – 1.0%:"
                        - text: For moderately liquid pairs. Good balance of protection and execution rate.
                      - listitem [ref=e106]:
                        - strong [ref=e107]: "1.0%+:"
                        - text: For illiquid pairs or large trades relative to pool size. Higher risk of unfavorable execution.
                    - paragraph [ref=e108]: A higher slippage tolerance means your transaction is more likely to succeed, but you may receive fewer tokens than expected. A lower tolerance protects against unfavorable execution but may cause more transaction failures.
                - generic [ref=e109]:
                  - button "What are multi-hop routes?" [ref=e110] [cursor=pointer]:
                    - generic [ref=e111]:
                      - img [ref=e113]
                      - generic [ref=e117]: What are multi-hop routes?
                    - img [ref=e118]
                  - generic [ref=e121]:
                    - paragraph [ref=e122]:
                      - text: A
                      - strong [ref=e123]: multi-hop route
                      - text: is a swap path that goes through one or more intermediate tokens before reaching the destination. For example, swapping Token A → Token B → Token C instead of a direct A → C swap.
                    - paragraph [ref=e124]: "Multi-hop routes can yield a higher output than direct swaps when:"
                    - list [ref=e125]:
                      - listitem [ref=e126]: There is no direct pool for the desired pair
                      - listitem [ref=e127]: The direct pool has low liquidity
                      - listitem [ref=e128]: The intermediate pools offer a more favorable combined rate
                    - paragraph [ref=e129]:
                      - text: OmnomSwap explores routes up to
                      - strong [ref=e130]: 4 hops
                      - text: and displays all viable options. Each additional hop incurs gas costs and pool fees (0.3% per hop), which are factored into the output calculation.
                - generic [ref=e131]:
                  - button "What is an AMM?" [ref=e132] [cursor=pointer]:
                    - generic [ref=e133]:
                      - img [ref=e135]
                      - generic [ref=e139]: What is an AMM?
                    - img [ref=e140]
                  - generic [ref=e143]:
                    - paragraph [ref=e144]:
                      - text: An
                      - strong [ref=e145]: Automated Market Maker (AMM)
                      - text: is a type of decentralized exchange that uses a mathematical formula to price assets, instead of an order book.
                    - paragraph [ref=e146]:
                      - strong [ref=e147]: "Constant-product formula:"
                      - text: "The most common AMM model (used by UniswapV2 and the DEXes on Dogechain) uses the formula:"
                    - generic [ref=e148]: x × y = k
                    - paragraph [ref=e149]:
                      - text: Where
                      - code [ref=e150]: x
                      - text: and
                      - code [ref=e151]: "y"
                      - text: represent the reserves of two tokens in a pool, and
                      - code [ref=e152]: k
                      - text: is a constant. When you swap token X for token Y, you add X to the pool and remove Y, keeping the product constant.
                    - paragraph [ref=e153]:
                      - strong [ref=e154]: "Output calculation with 0.3% fee:"
                    - generic [ref=e155]: amountOut = (R_out × amountIn × 997) / (R_in × 1000 + amountIn × 997)
                    - paragraph [ref=e156]: This formula is used by OmnomSwap to calculate expected outputs. The same formula can be used to independently verify any quoted amount by checking the on-chain reserves.
                - generic [ref=e157]:
                  - button "What is MEV and front-running?" [ref=e158] [cursor=pointer]:
                    - generic [ref=e159]:
                      - img [ref=e161]
                      - generic [ref=e163]: What is MEV and front-running?
                    - img [ref=e164]
                  - generic [ref=e167]:
                    - paragraph [ref=e168]:
                      - strong [ref=e169]: Maximal Extractable Value (MEV)
                      - text: is the maximum value that can be extracted from block production by including, excluding, or reordering transactions. MEV bots monitor the public mempool and exploit visible swap transactions for profit.
                    - paragraph [ref=e170]:
                      - strong [ref=e171]: "Common MEV attacks on swaps:"
                    - list [ref=e172]:
                      - listitem [ref=e173]:
                        - strong [ref=e174]: "Front-running:"
                        - text: A bot sees your pending swap in the mempool and submits the same swap with higher gas to execute first, moving the price against you.
                      - listitem [ref=e175]:
                        - strong [ref=e176]: "Sandwich attack:"
                        - text: A bot places a buy order before your swap and a sell order after, profiting from the price movement your trade causes.
                    - paragraph [ref=e177]:
                      - strong [ref=e178]: "How slippage tolerance protects you:"
                      - text: Setting an appropriate slippage tolerance limits the maximum loss from MEV. A lower slippage tolerance provides more protection but may cause more failed transactions.
                    - paragraph [ref=e179]:
                      - strong [ref=e180]: "Why exact-amount approvals are safer:"
                      - text: OmnomSwap approves only the exact swap amount (plus a tiny 0.1% buffer) rather than unlimited token allowances. This means if the aggregator contract were ever compromised, the attacker could only access the tokens approved for the current swap — not your entire balance.
                    - paragraph [ref=e181]:
                      - text: ⚠️
                      - strong [ref=e182]: Dogechain currently has no MEV protection infrastructure
                      - text: (no Flashbots, no private mempools). All transactions are broadcast to the public mempool.
                    - paragraph [ref=e183]:
                      - strong [ref=e184]: "Tips to reduce MEV exposure:"
                    - list [ref=e185]:
                      - listitem [ref=e186]: Use conservative slippage settings (0.5% or lower)
                      - listitem [ref=e187]: Avoid large single trades — split into smaller swaps if needed
                      - listitem [ref=e188]: Trade during periods of lower network activity when MEV bots are less active
                - generic [ref=e189]:
                  - button "How to verify routes independently" [ref=e190] [cursor=pointer]:
                    - generic [ref=e191]:
