                        - code [ref=e205]: getReserves()
                        - text: to get current reserves.
                      - listitem [ref=e206]:
                        - strong [ref=e207]: "Apply the formula:"
                        - text: "Use the constant-product formula with the 0.3% fee to calculate the expected output:"
                        - generic [ref=e208]: amountOut = (R_out × amountIn × 997) / (R_in × 1000 + amountIn × 997)
                      - listitem [ref=e209]:
