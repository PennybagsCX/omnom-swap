# OmnomSwap CI/CD Pipeline
# https://github.com/PennybagsCX/omnom-swap

name: CI

# ============================================================
# TRIGGERS
# ============================================================
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ============================================================
# CONCURRENCY
# Cancel redundant runs on same branch/PR
# ============================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# PERMISSIONS
# ============================================================
permissions:
  contents: read
  pull-requests: write
  deployments: write

# ============================================================
# ENVIRONMENT SECRETS (configure in GitHub repo settings)
# ============================================================
# Required secrets for deployment:
#   VERCEL_TOKEN     - Vercel API token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID    - Vercel organization ID (from Vercel dashboard)
#   VERCEL_PROJECT_ID - Vercel project ID (from Vercel dashboard)

# ============================================================
# JOBS - Run sequentially (fail-fast on any failure)
# ============================================================
jobs:
  # ------------------------------------------------------------
  # Job 1: TypeScript Type Checking
  # ------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run lint  # npm run lint runs `tsc --noEmit`

  # ------------------------------------------------------------
  # Job 2: ESLint
  # ------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: typecheck  # Run after typecheck passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .ts,.tsx

  # ------------------------------------------------------------
  # Job 3: Foundry Smart Contract Tests
  # ------------------------------------------------------------
  foundry-tests:
    name: Foundry Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint  # Run after lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Run Foundry tests
        run: forge test -vvv

  # ------------------------------------------------------------
  # Job 4: Frontend Tests (Vitest)
  # ------------------------------------------------------------
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: foundry-tests  # Run after foundry tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

  # ------------------------------------------------------------
  # Job 5: Build
  # ------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: frontend-tests  # Run after frontend tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ------------------------------------------------------------
  # Job 6: Security Audit (Slither)
  # Runs only if Slither is available, otherwise skipped
  # ------------------------------------------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build  # Run after build completes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Try to install Slither
        run: |
          pip install slither-analyzer 2>/dev/null || echo "SLITHER_NOT_INSTALLED=true" >> $GITHUB_ENV

      - name: Run Slither security analysis
        if: env.SLITHER_NOT_INSTALLED != 'true'
        run: slither . --solc-remaps 'forge-std/=lib/forge-std/src/' --exclude-dependencies 2>/dev/null || echo "Slither scan completed with warnings"

      - name: Slither not available
        if: env.SLITHER_NOT_INSTALLED == 'true'
        run: echo "Slither not available, skipping security audit"

  # ------------------------------------------------------------
  # Job 7: Deploy to Vercel
  # ONLY runs on push to main, NOT on pull requests
  # ------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, security-audit]  # Wait for both build and security audit
    # Only deploy on main branch push, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Vercel Deployment\n\n✅ Preview deployed to: ${{ steps.deploy.outputs.url }}'
            })
