[profile.default]
src = "contracts"
out = "out"
cache_path = "cache"
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "forge-std/=lib/forge-std/src/",
]

[profile.fork]
# Mainnet fork testing profile - uses Dogechain RPC
fork = true
# Fuzz testing with higher iterations
fuzz_runs = 10000
# Gas snapshot enabled

[profile.intense]
# Intensive fuzz testing
fuzz_runs = 100000
via_ir = true
optimizer_runs = 200

[rpc_endpoints]
dogechain = "https://rpc.dogechain.dog"
dogechain_fork = "https://rpc.dogechain.dog"
