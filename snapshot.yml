                  - generic [ref=e224]:
                    - paragraph [ref=e225]: "Trading in decentralized finance (DeFi) carries significant risks. By using OmnomSwap, you acknowledge and accept the following:"
                    - list [ref=e226]:
                      - listitem [ref=e227]:
                        - strong [ref=e228]: "Smart contract risk:"
                        - text: Bugs or vulnerabilities in the aggregator contract, DEX contracts, or token contracts could result in loss of funds.
                      - listitem [ref=e229]:
                        - strong [ref=e230]: "Price volatility:"
                        - text: Token prices can change rapidly. The output displayed may differ from the actual execution due to market movements.
                      - listitem [ref=e231]:
                        - strong [ref=e232]: "Impermanent loss:"
                        - text: If you provide liquidity to pools, you may experience impermanent loss when token prices diverge.
                      - listitem [ref=e233]:
                        - strong [ref=e234]: "Liquidity risk:"
                        - text: Pools may have insufficient liquidity for large trades, resulting in high price impact.
                      - listitem [ref=e235]:
                        - strong [ref=e236]: "Network risk:"
                        - text: Dogechain network congestion or outages may delay or prevent transaction execution.
                      - listitem [ref=e237]:
                        - strong [ref=e238]: "MEV risk:"
                        - text: Your transactions may be subject to front-running or sandwich attacks by MEV bots.
                      - listitem [ref=e239]:
                        - strong [ref=e240]: "No recourse:"
                        - text: Transactions on the blockchain are irreversible. There is no customer support or dispute resolution process.
                    - paragraph [ref=e241]: Only trade with funds you can afford to lose. This interface does not provide investment advice.
